services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metamarket
      POSTGRES_USER: metamarket
      POSTGRES_PASSWORD: metamarket
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
